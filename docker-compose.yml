services:
  postgres:
    image: postgres:16

    container_name: job_scheduler_db

    restart: unless-stopped

    environment:
      POSTGRES_USER: scheduler
      POSTGRES_PASSWORD: scheduler123
      POSTGRES_DB: job_scheduler

    ports:
      - "5432:5432"

    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data: